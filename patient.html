<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AyurSutra — Patient Dashboard</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* star rating */
    .star-group { display:flex; gap:0.4rem; margin:0.35rem 0; }
    .star {
      font-size:1.5rem;
      cursor:pointer;
      color:#d1d5db;
      transition:color 0.15s;
      line-height:1;
    }
    .star.selected, .star:hover { color:#f6c90e; }
    .rating-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.9rem; }
    .rating-label { font-size:0.88rem; font-weight:500; }
  </style>
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-leaf">🌿</div>
        <span>AyurSutra</span>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">Menu</div>
        <button class="nav-link active" data-view="overview" onclick="setPatientView('overview')">
          <span class="icon">🏠</span> My Dashboard
        </button>
        <button class="nav-link" data-view="sessions" onclick="setPatientView('sessions')">
          <span class="icon">🗓</span> My Sessions
        </button>
        <button class="nav-link" data-view="notifications" onclick="setPatientView('notifications')">
          <span class="icon">🔔</span> Notifications
          <span class="badge badge-red" style="margin-left:auto; font-size:0.7rem;" id="navNotifBadge">2</span>
        </button>
      </div>

      <div class="sidebar-user">
        <div class="user-info">
          <div class="user-avatar" id="ptInitials">RM</div>
          <div class="user-meta">
            <div class="user-name" id="ptName">Rahul Mehta</div>
            <div class="user-role">Patient</div>
          </div>
          <button class="btn-logout" onclick="logout()" title="Logout">⬡</button>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <div class="topbar">
        <div>
          <div class="topbar-title" id="ptTopbarTitle">My Dashboard</div>
          <div class="topbar-sub" id="ptTopbarDate"></div>
        </div>
        <div class="topbar-right">
          <button class="notif-btn" onclick="setPatientView('notifications')">
            🔔
            <div class="notif-badge" id="ptNotifBadge">2</div>
          </button>
        </div>
      </div>

      <div class="content" id="ptContent">
        <!-- populated by JS -->
      </div>
    </div>
  </div>

  <!-- Feedback Modal -->
  <div class="modal-overlay" id="feedbackModal">
    <div class="modal">
      <h3>Session Feedback</h3>
      <input type="hidden" id="fbSessionId" />

      <div style="background:var(--bg); border-radius:8px; padding:0.8rem; margin-bottom:1.25rem; font-size:0.88rem;">
        <strong id="fbTherapy"></strong> &nbsp;·&nbsp; <span id="fbDate" style="color:#718096;"></span>
      </div>

      <div class="rating-row">
        <span class="rating-label">Pain level after session</span>
        <div class="star-group" data-name="pain">
          <span class="star" data-val="1">★</span>
          <span class="star" data-val="2">★</span>
          <span class="star" data-val="3">★</span>
          <span class="star" data-val="4">★</span>
          <span class="star" data-val="5">★</span>
        </div>
      </div>

      <div class="rating-row">
        <span class="rating-label">Energy level</span>
        <div class="star-group" data-name="energy">
          <span class="star" data-val="1">★</span>
          <span class="star" data-val="2">★</span>
          <span class="star" data-val="3">★</span>
          <span class="star" data-val="4">★</span>
          <span class="star" data-val="5">★</span>
        </div>
      </div>

      <div class="rating-row">
        <span class="rating-label">Overall experience *</span>
        <div class="star-group" data-name="overall">
          <span class="star" data-val="1">★</span>
          <span class="star" data-val="2">★</span>
          <span class="star" data-val="3">★</span>
          <span class="star" data-val="4">★</span>
          <span class="star" data-val="5">★</span>
        </div>
      </div>

      <div class="form-field" style="margin-top:0.5rem;">
        <label>Additional notes (optional)</label>
        <textarea id="fbNotes" placeholder="How are you feeling? Any side effects or improvements?"></textarea>
      </div>

      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeFeedbackModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitFeedback()">Submit Feedback</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/patient.js"></script>
  <script>
    // guard
    const session = getSession();
    if (!session || session.role !== "patient") {
      window.location.href = "index.html";
    } else {
      document.getElementById("ptName").textContent = session.name;
      document.getElementById("ptInitials").textContent = session.initials;
    }

    document.getElementById("ptTopbarDate").textContent = new Date().toLocaleDateString("en-IN", {
      weekday: "long", year: "numeric", month: "long", day: "numeric"
    });

    // init star ratings after DOM is ready
    const feedbackModal = document.getElementById("feedbackModal");
    initStarRatings(feedbackModal);

    renderPatientOverview();

    const unread = NOTIFICATIONS.patient.filter(n => n.unread).length;
    if (!unread) {
      document.getElementById("ptNotifBadge").style.display = "none";
      document.getElementById("navNotifBadge").style.display = "none";
    }
  </script>
</body>
</html>
